name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Opcional: fuerza a que TODAS las GitHub Actions JavaScript del workflow
# usen Node 24 desde ya (recomendación de GitHub para la transición 2026).
# Si prefieres no forzarlo aún, puedes comentar este bloque.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Node 24-compatible)
        uses: actions/checkout@v5

      # withastro/action v5: build + artifact para Pages
      - name: Install, build, and upload site
        uses: withastro/action@v5
        with:
          path: .
          node-version: 24   # alíneate ya con la migración a Node 24

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
